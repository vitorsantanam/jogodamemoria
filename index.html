<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jogo da Memória - Dia das Mulheres</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">

    <!-- ===== PARTÍCULAS ===== -->
    <div class="particles" id="particles"></div>

    <!-- ===== BANNER TOPO ===== -->
    <header class="header">
      <img id="bannerImage" class="banner-img" src="images/banner.png" alt="Feliz Dia das Mulheres" onerror="this.onerror=null;this.outerHTML='<h1 class=banner-fallback>Feliz Dia das Mulheres! 💐</h1>'">
    </header>

    <!-- ===== TIMER ===== -->
    <div class="timer-bar">
      <div class="timer-ring">
        <svg viewBox="0 0 120 120">
          <circle class="timer-bg" cx="60" cy="60" r="54"/>
          <circle class="timer-progress" id="timerProgress" cx="60" cy="60" r="54"/>
        </svg>
        <span class="timer-text" id="timerText">60</span>
      </div>
      <span class="timer-label">segundos</span>
    </div>

    <!-- ===== TABULEIRO ===== -->
    <div class="board-area">
      <div class="board" id="board">
        <!-- Cards gerados via JS -->
      </div>
    </div>

    <!-- ===== BOTÃO RECOMEÇAR ===== -->
    <div class="actions">
      <button class="btn" id="btnRestart" onclick="restartGame()">
        &#8635; Recomeçar
      </button>
    </div>

    <!-- ===== LOGO RODAPÉ ===== -->
    <footer class="footer">
      <img id="footerLogo" class="footer-logo" src="images/logo.png" alt="Logo" onerror="this.style.display='none'">
    </footer>

    <!-- ===== TELA INICIAL ===== -->
    <div class="overlay" id="overlayStart">
      <div class="overlay-box overlay-start">
        <div class="overlay-emoji">💐</div>
        <h2 class="overlay-title" id="startTitle">Feliz Dia das Mulheres!</h2>
        <p class="overlay-msg" id="startMsg">Encontre todos os pares e ganhe uma lembrancinha!</p>
        <img class="overlay-img" id="startImg" src="images/banner.png" alt="" onerror="this.style.display='none'">
        <button class="btn btn-big pulse" onclick="startGame()">&#9654; Toque para Jogar!</button>
      </div>
    </div>

    <!-- ===== OVERLAY VITÓRIA ===== -->
    <div class="overlay" id="overlayWin">
      <div class="overlay-box overlay-win">
        <div id="confetti" class="confetti"></div>
        <div class="overlay-emoji">🎉</div>
        <h2 class="overlay-title" id="winTitle">Parabéns, você ganhou!</h2>
        <p class="overlay-msg" id="winMsg">Você encontrou todos os pares! 🎁<br>Retire sua lembrancinha especial!</p>
        <img class="overlay-img" id="winImg" src="images/vitoria.png" alt="" onerror="this.style.display='none'">
        <button class="btn btn-big" onclick="restartGame()">&#8635; Jogar Novamente</button>
      </div>
    </div>

    <!-- ===== OVERLAY TEMPO ESGOTADO ===== -->
    <div class="overlay" id="overlayTimeout">
      <div class="overlay-box overlay-timeout">
        <div class="overlay-emoji">⏰</div>
        <h2 class="overlay-title" id="timeoutTitle">Que pena, o tempo acabou!</h2>
        <p class="overlay-msg" id="timeoutMsg">Mas não fique triste! 😊<br>Tente novamente, temos certeza que você consegue!</p>
        <img class="overlay-img" id="timeoutImg" src="images/tempo_esgotado.png" alt="" onerror="this.style.display='none'">
        <button class="btn btn-big" onclick="restartGame()">&#8635; Tentar Novamente</button>
      </div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
